name: Build and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin --bundles dmg --ci
            artifact_paths: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macos-x86_64
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin --bundles dmg --ci
            artifact_paths: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: linux-x86_64
            runner: ubuntu-22.04
            rust_target: ""
            tauri_args: --bundles deb appimage --ci
            artifact_paths: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - name: windows-x86_64
            runner: windows-latest
            rust_target: ""
            tauri_args: --bundles nsis --ci
            artifact_paths: src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Use Rust stable
        run: rustup default stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive app version
        id: version
        run: node scripts/derive-version.mjs

      - name: Build Tauri app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }} --config ${{ steps.version.outputs.config_path }}

      - name: Upload build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: rusbview-${{ steps.version.outputs.version }}-${{ matrix.name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

      - name: Build and publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: ${{ matrix.tauri_args }} --config ${{ steps.version.outputs.config_path }}
          tagName: ${{ github.ref_name }}
          releaseName: rusbview ${{ steps.version.outputs.version }}
          releaseBody: Automated release for ${{ steps.version.outputs.version }}.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          assetNamePattern: rusbview-[version]-[platform]-[arch][setup][ext]

      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats
          fi
